
<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Form Henkaten</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #1f2937;
    }

    .container {
      max-width: 980px;
      margin: 32px auto;
      padding: 20px;
    }

    .card {
      background:       #ffffff;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }

    .header {
      background: #0f4c81;
      color: #ffffff;
      padding: 24px;
    }

    .header h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    .header p {
      margin: 0;
      opacity: 0.9;
    }

    form {
      padding: 24px;
    }

    .section-title {
      margin: 24px 0 14px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e5e7eb;
      color: #0f4c81;
      font-size: 18px;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-weight: 600;
      font-size: 14px;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
      background: #ffffff;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #0f4c81;
      box-shadow: 0 0 0 3px rgba(15, 76, 129, 0.12);
    }

    .radio-group {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      padding-top: 8px;
    }

    .radio-group label {
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 26px;
      padding-top: 20px;
      border-top: 1px solid #e5e7eb;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-reset {
      background: #e5e7eb;
      color: #374151;
    }

    .btn-submit {
      background: #0f4c81;
      color: #ffffff;
    }

    .message {
      display: none;
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      background: #dcfce7;
      color: #166534;
      font-weight: 600;
    }

    @media (max-width: 720px) {
      .container {
        margin: 0;
        padding: 12px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .actions {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }

    @media print {
      body {
        background: #ffffff;
      }

      .container {
        margin: 0;
        max-width: none;
      }

      .card {
        box-shadow: none;
      }

      .actions,
      .message {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="card">
      <div class="header">
        <h1>Form Henkaten Finishing </h1>
        <p>Formulir permintaan perubahan proses, produk, atau dokumen.</p>
      </div>

      <div style="padding:12px 24px;display:flex;gap:12px;justify-content:flex-end;background:#f8fafc;border-bottom:1px solid #e5e7eb;">
        <a href="hasil.html" class="btn-menu" style="color:#fff;background:#0f4c81;padding:8px 16px;border-radius:8px;text-decoration:none;font-weight:700;font-size:14px;">Lihat Hasil</a>
      </div>

      <form id="henkatenForm">
        <div class="section-title">Data Pemohon</div>

        <div class="grid">
          <div class="field">
            <label for="tanggal">Tanggal Pengajuan</label>
            <input type="date" id="tanggal" name="tanggal" required />
          </div>

          <div class="field">
            <label for="nomor">Nomor Henkaten</label>
            <input type="text" id="nomor" name="nomor" placeholder="Contoh: HKT-001/2026" />
          </div>

          <div class="field">
            <label for="nama">Nama Pemohon</label>
            <input type="text" id="nama" name="nama" placeholder="Masukkan nama pemohon" required />
          </div>

          <div class="field">
            <label for="departemen">Departemen</label>
            <input type="text" id="departemen" name="departemen" placeholder="Contoh: Produksi" required />
          </div>

          <div class="field">
            <label for="jabatan">Jabatan</label>
            <select id="jabatan" name="Jabatan" required>
                <option value="">Pilih Jabatan</option>
                <option>Operator</option>
                <option>Team Leader</option>
                <option>Group Leader</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="area">Proses</label>
            <select id="area" name="area" required>
              <option value="">Pilih Proses</option>
              <option>K/O MC</option>
              <option>HSB 005</option>
              <option>HSB 006</option>
              <option>MC Gerinding</option>
              <option>Final Proses</option>
              <option>QC Gate 1</option>
              <option>QC Gate 2</option>
              <option>Spraybooth</option>
              <option>Metalicone</option>
            </select>
          </div>
        </div>

        <div class="section-title">Detail Perubahan</div>

        <div class="grid">
          <div class="field">
            <label for="kategori">Kategori Perubahan</label>
            <select id="kategori" name="kategori" required>
              <option value="">Pilih kategori</option>
              <option>Proses</option>
              <option>Produk / Material</option>
              <option>Mesin / Peralatan</option>
              <option>Dokumen / Standar Kerja</option>
              <option>Personel</option>
              <option>Lainnya</option>
            </select>
          </div>

          <div class="field">
            <label for="tanggalEfektif">Tanggal Efektif</label>
            <input type="date" id="tanggalEfektif" name="tanggalEfektif" />
          </div>

          <div class="field full">
            <label for="judul">Judul Perubahan</label>
            <input type="text" id="judul" name="judul" placeholder="Ringkasan perubahan" required />
          </div>

          <div class="field full">
            <label for="kondisiSaatIni">Kondisi Saat Ini</label>
            <textarea id="kondisiSaatIni" name="kondisiSaatIni" placeholder="Jelaskan kondisi sebelum perubahan" required></textarea>
          </div>

          <div class="field full">
            <label for="perubahan">Perubahan yang Diusulkan</label>
            <textarea id="perubahan" name="perubahan" placeholder="Jelaskan perubahan yang akan dilakukan" required></textarea>
          </div>

          <div class="field full">
            <label for="alasan">Alasan Perubahan</label>
            <textarea id="alasan" name="alasan" placeholder="Jelaskan alasan atau tujuan perubahan" required></textarea>
          </div>
        </div>

        <div class="section-title">Jenis Change Point</div>

        <div class="radio-group" style="padding:0 0 12px;">
          <label><input type="checkbox" name="changePoint" value="Man" /> Man</label>
          <label><input type="checkbox" name="changePoint" value="Machine" /> Machine</label>
          <label><input type="checkbox" name="changePoint" value="Method" /> Method</label>
          <label><input type="checkbox" name="changePoint" value="Material" /> Material</label>
          <label><input type="checkbox" name="changePoint" value="Environment" /> Environment</label>
        </div>

        <div class="section-title">Evaluasi Risiko dan Dampak</div>

        <div class="grid">
          <div class="field">
            <label for="dampak">Tingkat Dampak</label>
            <select id="dampak" name="dampak" required>
              <option value="">Pilih tingkat dampak</option>
              <option>Rendah</option>
              <option>Sedang</option>
              <option>Tinggi</option>
            </select>
          </div>

          <div class="field">
            <label>Perlu Pelatihan?</label>
            <div class="radio-group">
              <label><input type="radio" name="pelatihan" value="Ya" required /> Ya</label>
              <label><input type="radio" name="pelatihan" value="Tidak" /> Tidak</label>
            </div>
          </div>

          <div class="field full">
            <label for="risiko">Potensi Risiko</label>
            <textarea id="risiko" name="risiko" placeholder="Tuliskan potensi risiko yang mungkin terjadi"></textarea>
          </div>

          <div class="field full">
            <label for="tindakan">Tindakan Pencegahan</label>
            <textarea id="tindakan" name="tindakan" placeholder="Tuliskan tindakan pencegahan atau kontrol yang diperlukan"></textarea>
          </div>

          <div class="field full">
            <label for="lampiran">Lampiran</label>
            <input type="file" id="lampiran" name="lampiran" accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png" />
          </div>
        </div>

        <div class="actions">
          <button type="reset" class="btn-reset">Reset</button>
          <button type="submit" class="btn-submit">Kirim Form</button>
        </div>

        <div class="message" id="message">
          Pengajuan Henkaten telah dicatat. Hubungkan tombol ini ke sistem Anda untuk pengiriman data yang sebenarnya.
        </div>
      </form>
    </div>
  </main>

  <script>
    const form = document.getElementById("henkatenForm");
    const message = document.getElementById("message");
    const tanggal = document.getElementById("tanggal");

    tanggal.valueAsDate = new Date();

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      var data = {
        tanggal: document.getElementById("tanggal").value,
        nomor: document.getElementById("nomor").value,
        nama: document.getElementById("nama").value,
        departemen: document.getElementById("departemen").value,
        jabatan: document.getElementById("jabatan").value,
        area: document.getElementById("area").value,
        kategori: document.getElementById("kategori").value,
        tanggalEfektif: document.getElementById("tanggalEfektif").value,
        judul: document.getElementById("judul").value,
        kondisiSaatIni: document.getElementById("kondisiSaatIni").value,
        perubahan: document.getElementById("perubahan").value,
        alasan: document.getElementById("alasan").value,
        dampak: document.getElementById("dampak").value,
        pelatihan: document.querySelector('input[name="pelatihan"]:checked')?.value || "",
        risiko: document.getElementById("risiko").value,
        tindakan: document.getElementById("tindakan").value,
        changePoint: Array.from(document.querySelectorAll('input[name="changePoint"]:checked')).map(function (cb) { return cb.value; })
      };

      var stored = JSON.parse(localStorage.getItem("henkatenData") || "[]");
      stored.push(data);
      localStorage.setItem("henkatenData", JSON.stringify(stored));

      message.style.display = "block";
      message.scrollIntoView({ behavior: "smooth", block: "center" });
    });

    form.addEventListener("reset", function () {
      message.style.display = "none";
      setTimeout(function () {
        tanggal.valueAsDate = new Date();
      }, 0);
    });
  </script>
</body>
</html>
```
