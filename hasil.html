<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hasil Henkaten</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #6c9ddf;
      color: #1f2937;
    }

    .container {
      max-width: 1100px;
      margin: 32px auto;
      padding: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }

    .header {
      background: #0f4c81;
      color: #ffffff;
      padding: 24px;
    }

    .header h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    .header p {
      margin: 0;
      opacity: 0.9;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid #e5e7eb;
      flex-wrap: wrap;
      gap: 12px;
    }

    .toolbar input {
      max-width: 300px;
    }

    .btn-menu {
      display: inline-block;
      padding: 10px 18px;
      background: #0f4c81;
      color: #ffffff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      border: 0;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-menu:hover {
      background: #0a3a63;
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 13px;
      border-radius: 6px;
      background: #dc2626;
      color: #fff;
      border: 0;
      cursor: pointer;
    }

    .btn-sm:hover {
      background: #b91c1c;
    }

    .btn-detail {
      padding: 6px 12px;
      font-size: 13px;
      border-radius: 6px;
      background: #0f4c81;
      color: #fff;
      border: 0;
      cursor: pointer;
    }

    .btn-detail:hover {
      background: #0a3a63;
    }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 700;
      background: #e5e7eb;
      color: #374151;
      margin: 1px;
    }

    .tag.ya {
      background: #dcfce7;
      color: #166534;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      inset: 0;
      background: rgba(0,0,0,0.4);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: #fff;
      border-radius: 10px;
      max-width: 720px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px;
      position: relative;
    }

    .modal-content h2 {
      margin: 0 0 16px;
      color: #0f4c81;
    }

    .modal-content .close {
      position: absolute;
      top: 14px;
      right: 18px;
      font-size: 24px;
      cursor: pointer;
      color: #6b7280;
    }

    .modal-content .close:hover {
      color: #000;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 20px;
    }

    .modal-grid .full {
      grid-column: 1 / -1;
    }

    .modal-grid .label {
      font-weight: 700;
      color: #374151;
    }

    .modal-grid .value {
      color: #1f2937;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: #f1f5f9;
      text-align: left;
      padding: 12px 14px;
      font-size: 13px;
      white-space: nowrap;
    }

    td {
      padding: 10px 14px;
      font-size: 14px;
      border-bottom: 1px solid #e5e7eb;
    }

    tr:hover {
      background: #f8fafc;
    }

    .empty {
      text-align: center;
      padding: 48px 20px;
      color: #6b7280;
    }

    .empty p {
      margin: 6px 0;
    }

    @media (max-width: 720px) {
      .container {
        margin: 0;
        padding: 12px;
      }

      table {
        font-size: 13px;
      }

      th, td {
        padding: 8px 10px;
      }
    }

    @media print {
      body {
        background: #ffffff;
      }

      .container {
        margin: 0;
        max-width: none;
      }

      .card {
        box-shadow: none;
      }

      .toolbar {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="card">
      <div class="header">
        <h1>Hasil Pengajuan Henkaten</h1>
        <p>Daftar seluruh pengajuan perubahan yang telah dicatat.</p>
      </div>

      <div class="toolbar">
        <a href="index.html" class="btn-menu">&larr; Kembali ke Form</a>
        <input type="text" id="searchInput" placeholder="Cari nomor, nama, atau judul..." />
      </div>

      <table>
        <thead>
          <tr>
            <th>No</th>
            <th>Tanggal</th>
            <th>Nomor Henkaten</th>
            <th>Nama Pemohon</th>
            <th>Departemen</th>
            <th>Judul Perubahan</th>
            <th>Kategori</th>
            <th>Change Point</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>

      <div class="empty" id="emptyState">
        <p>Belum ada data pengajuan.</p>
        <p><a href="index.html" class="btn-menu">Isi Form Henkaten</a></p>
      </div>
    </div>
    <div class="modal" id="detailModal">
      <div class="modal-content">
        <span class="close" id="modalClose">&times;</span>
        <h2>Detail Henkaten</h2>
        <div id="modalBody"></div>
      </div>
    </div>
  </main>

  <script>
    const tbody = document.getElementById("tableBody");
    const empty = document.getElementById("emptyState");
    const searchInput = document.getElementById("searchInput");
    const modal = document.getElementById("detailModal");
    const modalBody = document.getElementById("modalBody");

    function changePointTags(item) {
      var list = item.changePoint;
      if (!list || list.length === 0) return "-";
      return list.map(function (l) { return "<span class=\"tag ya\">" + l + "</span>"; }).join(" ");
    }

    function showDetail(item) {
      var html =
        '<div class="modal-grid">' +
          '<div class="full"><span class="label">Nomor Henkaten:</span> <span class="value">' + (item.nomor || "-") + '</span></div>' +
          '<div class="full"><span class="label">Judul Perubahan:</span> <span class="value">' + (item.judul || "-") + '</span></div>' +
          '<div><span class="label">Tanggal:</span> <span class="value">' + (item.tanggal || "-") + '</span></div>' +
          '<div><span class="label">Tanggal Efektif:</span> <span class="value">' + (item.tanggalEfektif || "-") + '</span></div>' +
          '<div><span class="label">Nama:</span> <span class="value">' + (item.nama || "-") + '</span></div>' +
          '<div><span class="label">Departemen:</span> <span class="value">' + (item.departemen || "-") + '</span></div>' +
          '<div><span class="label">Jabatan:</span> <span class="value">' + (item.jabatan || "-") + '</span></div>' +
          '<div><span class="label">Proses:</span> <span class="value">' + (item.area || "-") + '</span></div>' +
          '<div><span class="label">Kategori:</span> <span class="value">' + (item.kategori || "-") + '</span></div>' +
          '<div><span class="label">Dampak:</span> <span class="value">' + (item.dampak || "-") + '</span></div>' +
          '<div><span class="label">Pelatihan:</span> <span class="value">' + (item.pelatihan || "-") + '</span></div>' +
          '<div class="full"><span class="label">Kondisi Saat Ini:</span> <span class="value">' + (item.kondisiSaatIni || "-") + '</span></div>' +
          '<div class="full"><span class="label">Perubahan:</span> <span class="value">' + (item.perubahan || "-") + '</span></div>' +
          '<div class="full"><span class="label">Alasan:</span> <span class="value">' + (item.alasan || "-") + '</span></div>' +
          '<div class="full"><span class="label">Risiko:</span> <span class="value">' + (item.risiko || "-") + '</span></div>' +
          '<div class="full"><span class="label">Tindakan Pencegahan:</span> <span class="value">' + (item.tindakan || "-") + '</span></div>' +
          '<div class="full" style="margin-top:12px;padding-top:12px;border-top:2px solid #e5e7eb;"><strong>Jenis Change Point</strong></div>' +
          '<div class="full"><span class="value">' + changePointTags(item) + '</span></div>' +
        '</div>';
      modalBody.innerHTML = html;
      modal.classList.add("show");
    }

    function render(data) {
      tbody.innerHTML = "";

      if (!data || data.length === 0) {
        empty.style.display = "block";
        return;
      }

      empty.style.display = "none";

      data.forEach(function (item, index) {
        var tr = document.createElement("tr");
        tr.innerHTML =
          "<td>" + (index + 1) + "</td>" +
          "<td>" + (item.tanggal || "-") + "</td>" +
          "<td>" + (item.nomor || "-") + "</td>" +
          "<td>" + (item.nama || "-") + "</td>" +
          "<td>" + (item.departemen || "-") + "</td>" +
          "<td>" + (item.judul || "-") + "</td>" +
          "<td>" + (item.kategori || "-") + "</td>" +
          "<td>" + changePointTags(item) + "</td>" +
          "<td>" +
            "<button class=\"btn-detail\" data-index=\"" + index + "\">Detail</button> " +
            "<button class=\"btn-sm\" data-index=\"" + index + "\">Hapus</button>" +
          "</td>";

        tr.querySelector(".btn-detail").addEventListener("click", function () {
          showDetail(item);
        });

        tr.querySelector(".btn-sm").addEventListener("click", function () {
          if (confirm("Hapus data ini?")) {
            var stored = JSON.parse(localStorage.getItem("henkatenData") || "[]");
            stored.splice(index, 1);
            localStorage.setItem("henkatenData", JSON.stringify(stored));
            render(stored);
          }
        });

        tbody.appendChild(tr);
      });
    }

    function filterData(data, keyword) {
      if (!keyword) return data;
      var lower = keyword.toLowerCase();
      return data.filter(function (item) {
        return (item.nomor && item.nomor.toLowerCase().includes(lower)) ||
               (item.nama && item.nama.toLowerCase().includes(lower)) ||
               (item.judul && item.judul.toLowerCase().includes(lower)) ||
               (item.departemen && item.departemen.toLowerCase().includes(lower)) ||
               (item.changePoint && item.changePoint.some(function (cp) { return cp.toLowerCase().includes(lower); }));
      });
    }

    document.getElementById("modalClose").addEventListener("click", function () {
      modal.classList.remove("show");
    });

    modal.addEventListener("click", function (e) {
      if (e.target === modal) modal.classList.remove("show");
    });

    var storedData = JSON.parse(localStorage.getItem("henkatenData") || "[]");
    render(storedData);

    searchInput.addEventListener("input", function () {
      var filtered = filterData(storedData, this.value);
      render(filtered);
    });

    window.addEventListener("storage", function () {
      storedData = JSON.parse(localStorage.getItem("henkatenData") || "[]");
      render(storedData);
    });
  </script>
</body>
</html>
